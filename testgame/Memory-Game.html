```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Memory Game</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#f5f7fb;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.screen{display:none;text-align:center}

.title{font-size:50px;margin-bottom:40px}

button{
border:none;
border-radius:20px;
cursor:pointer;
color:white;
font-weight:600;
}

.big{
width:260px;
height:90px;
font-size:40px;
margin:10px;
}

.start{background:#34c759}
.rank{background:#ff9f0a}

.circle{
width:100px;
height:100px;
border-radius:50%;
font-size:40px;
margin:10px;
}

.blue{background:#0a84ff}
.purple{background:#af52de}

.levelBtn{
width:260px;
height:80px;
font-size:32px;
background:#0a84ff;
margin:10px;
}

.back{
margin-top:30px;
font-size:28px;
color:black;
background:none;
}

.grid{
display:grid;
grid-template-columns:repeat(3,90px);
gap:20px;
justify-content:center;
margin-top:20px;
}

.emojiBtn{
font-size:50px;
width:90px;
height:80px;
background:#0a84ff;
border-radius:15px;
}

#targets{font-size:70px;height:90px}

.combo{color:red;font-size:24px}

</style>
</head>

<body>

<div id="menu" class="screen">

<div id="title" class="title"></div>

<button class="big start" onclick="showLevel()" id="startBtn"></button>

<button class="big rank" onclick="showRanking()" id="rankBtn"></button>

<br>

<button class="circle blue" onclick="showHelp()">❓</button>

<button class="circle purple" onclick="toggleLang()" id="langBtn"></button>

</div>


<div id="level" class="screen">

<div id="levelTitle" class="title"></div>

<div id="levelButtons"></div>

<button class="back" onclick="backMenu()" id="back1"></button>

</div>


<div id="game" class="screen">

<div id="score"></div>

<div id="combo" class="combo"></div>

<button id="startGameBtn" class="big start" onclick="startRound()"></button>

<div id="targets"></div>

<div id="choices" class="grid"></div>

</div>


<div id="ranking" class="screen">

<div id="rankingTitle" class="title"></div>

<div id="rankingList"></div>

<button class="back" onclick="backMenu()" id="back2"></button>

</div>


<div id="help" class="screen">

<div id="helpTitle" class="title"></div>

<div id="helpText"></div>

<br>

<button onclick="backMenu()">OK</button>

</div>


<script>


let language="jp"
let difficulty=null

let score=0
let combo=0
let index=0

let targets=[]
let choices=[]

let showStart=true

let scores={
easy:[],
normal:[],
hard:[],
express:[]
}

const emojiList=[
"😀","😃","😄","😁","😆","😅","😂","🤣","🙂","🙃",
"🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼",
"🍎","🍊","🍌","🍉","🍇","🍓",
"🚗","🚕","🚙","🚌","🚲","✈️",
"⚽","🏀","⚾","🎾",
"🎸","🎹","🥁",
"🌸","🌹","🌻",
"⭐","✨","🔥"
]


function show(id){

document.querySelectorAll(".screen").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}


function toggleLang(){

language = language==="jp" ? "en":"jp"

updateText()

}


function updateText(){

document.getElementById("title").innerText=
language==="jp"?"🧠 メモリーゲーム":"🧠 Memory Game"

document.getElementById("startBtn").innerText=
language==="jp"?"スタート":"START"

document.getElementById("rankBtn").innerText=
language==="jp"?"ランキング":"Ranking"

document.getElementById("langBtn").innerText=
language==="jp"?"EN":"JP"

document.getElementById("levelTitle").innerText=
language==="jp"?"難易度":"Select Level"

document.getElementById("back1").innerText=
language==="jp"?"戻る":"Back"

document.getElementById("back2").innerText=
language==="jp"?"戻る":"Back"

document.getElementById("rankingTitle").innerText=
language==="jp"?"🏆 ランキング":"🏆 Ranking"

document.getElementById("helpTitle").innerText=
language==="jp"?"使い方":"How to Play"

document.getElementById("helpText").innerText=
language==="jp"
?"絵文字を覚えてください。消えたら同じ順番で押します。"
:"Remember the emojis. Tap them in the same order."

document.getElementById("startGameBtn").innerText=
language==="jp"?"スタート":"Start"

}


function showLevel(){

show("level")

let div=document.getElementById("levelButtons")

div.innerHTML=""

const diffs=["easy","normal","hard","express"]

diffs.forEach(d=>{

let name={
easy:["簡単","Easy"],
normal:["普通","Normal"],
hard:["難しい","Hard"],
express:["エキスパート","Expert"]
}

let b=document.createElement("button")

b.className="levelBtn"

b.innerText=language==="jp"?name[d][0]:name[d][1]

b.onclick=()=>startGame(d)

div.appendChild(b)

})

}


function backMenu(){

show("menu")

}


function showHelp(){

show("help")

}


function showRanking(){

show("ranking")

let html=""

for(let d of ["easy","normal","hard","express"]){

let name={
easy:["簡単","Easy"],
normal:["普通","Normal"],
hard:["難しい","Hard"],
express:["エキスパート","Expert"]
}

html+="<h3>"+(language==="jp"?name[d][0]:name[d][1])+"</h3>"

let arr=scores[d]

for(let i=0;i<5;i++){

if(arr[i]!=null){

html+=language==="jp"
?`${i+1}位: ${arr[i]}<br>`
:`${i+1}: ${arr[i]}<br>`

}else{

html+=language==="jp"
?`${i+1}位: ---<br>`
:`${i+1}: ---<br>`

}

}

}

document.getElementById("rankingList").innerHTML=html

}


function startGame(diff){

difficulty=diff

score=0
combo=0

showStart=true

show("game")

updateScore()

}


function startRound(){

showStart=false

newQuestion()

}


function updateScore(){

document.getElementById("score").innerText=
language==="jp"
?`スコア ${score}`
:`Score ${score}`

document.getElementById("combo").innerText=
combo>1
?(language==="jp"?`🔥 コンボ ${combo}`:`🔥 Combo ${combo}`)
:""

}


function count(){

if(difficulty==="easy") return 1
if(difficulty==="normal") return Math.min(score+1,4)
if(difficulty==="hard") return Math.min(score+1,8)
if(difficulty==="express") return Math.min(score+1,8)

}


function newQuestion(){

index=0
targets=[]

for(let i=0;i<count();i++){
targets.push(randomEmoji())
}

document.getElementById("targets").innerText=targets.join(" ")

let set=new Set(targets)

while(set.size<8){
set.add(randomEmoji())
}

choices=[...set].sort(()=>Math.random()-0.5)

let time = difficulty==="express"
?Math.max(500,2000-score*100)
:2000

setTimeout(()=>{

document.getElementById("targets").innerText=""

showChoices()

},time)

}


function showChoices(){

let div=document.getElementById("choices")

div.innerHTML=""

choices.forEach(e=>{

let b=document.createElement("button")

b.className="emojiBtn"

b.innerText=e

b.onclick=()=>check(e)

div.appendChild(b)

})

}


function check(e){

if(e===targets[index]){

index++

if(index>=targets.length){

score++
combo++

updateScore()

saveScore()

newQuestion()

}

}else{

combo=0

alert(
language==="jp"
?`ゲームオーバー\nスコア ${score}`
:`Game Over\nScore ${score}`
)

backMenu()

}

}


function randomEmoji(){

return emojiList[Math.floor(Math.random()*emojiList.length)]

}


function saveScore(){

let arr=scores[difficulty]

if(arr.length<5 || score>arr[arr.length-1]){

if(!arr.includes(score)){

arr.push(score)

arr.sort((a,b)=>b-a)

scores[difficulty]=arr.slice(0,5)

}

}

}


updateText()

show("menu")

</script>

</body>
</html>
```
