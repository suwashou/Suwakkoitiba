<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Memory Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:sans-serif;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding-top:40px;
}

.container{
width:360px;
text-align:center;
margin:auto;
}

.screen{display:none;}
.active{display:block;}

.title{
font-size:50px;
margin-bottom:40px;
}

button{
border:none;
cursor:pointer;
display:block;
margin-left:auto;
margin-right:auto;
}

.big{
font-size:40px;
width:260px;
height:90px;
border-radius:20px;
color:white;
}

.mid{
font-size:30px;
width:260px;
height:80px;
border-radius:20px;
color:white;
}

.circle{
width:100px;
height:100px;
border-radius:50%;
font-size:30px;
color:white;
margin:10px auto;
}

.green{background:green}
.orange{background:orange}
.blue{background:#2196f3}
.purple{background:purple}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.grid button{
font-size:50px;
height:80px;
border-radius:15px;
background:#2196f3;
color:white;
transition:0.1s;
}

.grid button:active{
transform:scale(0.9);
background:#1976d2;
}

.target{
font-size:70px;
margin:5px;
}

.combo{
font-size:24px;
color:red;
}

.rank{
font-size:26px;
}

.back{
margin-top:30px;
font-size:28px;
}

#ranking{
max-height:80vh;
overflow-y:auto;
}

#lives{
font-size:20px;
color:red;
margin-top:10px;
}

/* 判定表示 */

#result{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
pointer-events:none;
opacity:0;
transition:0.2s;
}

.showResult{
opacity:1;
}

</style>
</head>

<body>

<div class="container">

<!-- MENU -->

<div id="menu" class="screen active">

<div class="title">🧠 Memory Game</div>

<button class="big green" onclick="openLevel()">START</button>

<br>

<button class="mid orange" onclick="openRanking()">Ranking</button>

</div>


<!-- LEVEL -->

<div id="level" class="screen">

<h1>Select Level</h1>

<div id="levelButtons"></div>

<button class="back" onclick="showMenu()">Back</button>

</div>


<!-- GAME -->

<div id="game" class="screen">

<div id="score"></div>

<div id="combo"></div>

<div id="lives"></div>

<br>

<button id="startBtn" class="big green" onclick="startGame()">Start</button>

<div id="targets"></div>

<div id="choices" class="grid"></div>

<button class="back" onclick="showMenu()">Back</button>

</div>


<!-- RANKING -->

<div id="ranking" class="screen">

<h1>🏆 Ranking</h1>

<div id="rankingList"></div>

<button class="back" onclick="showMenu()">Back</button>

</div>

</div>

<div id="result"></div>

<script>

// =================
// Emoji
// =================

const emojiList=[
"😀","😃","😄","😁","😆","😅","😂","🤣","🙂","🙃",
"🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼",
"🍎","🍊","🍋","🍌","🍉","🍇","🍓",
"🚗","🚕","🚙","🚌","🚎","🏎",
"⚽","🏀","🏈","⚾","🎾",
"🎸","🎹","🥁","🎺","🎻",
"🌸","🌹","🌺","🌻",
"⭐","🌟","✨","⚡","🔥"
];

// =================
// Difficulty
// =================

const difficulties=["easy","normal","hard","express"];

// =================
// Ranking
// =================

let scores={easy:[],normal:[],hard:[],express:[]};

function loadRanking(){
let data=localStorage.getItem("ranking");
if(data) scores=JSON.parse(data);
}

function saveRanking(){
localStorage.setItem("ranking",JSON.stringify(scores));
}

loadRanking();

// =================
// Screen
// =================

function show(id){
document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"));

document.getElementById(id)
.classList.add("active");
}

function showMenu(){
show("menu");
}

// =================
// Level
// =================

function openLevel(){

let box=document.getElementById("levelButtons");

box.innerHTML="";

difficulties.forEach(d=>{

let btn=document.createElement("button");

btn.className="mid blue";

btn.innerText=d;

btn.onclick=()=>start(d);

box.appendChild(btn);

box.appendChild(document.createElement("br"));

box.appendChild(document.createElement("br"));

});

show("level");

}

// =================
// Game
// =================

let difficulty;
let targets=[];
let choices=[];
let index=0;
let score=0;
let combo=0;
let mistakes=0;

const maxMistakes=3;

// 効果音

const okSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3");

const ngSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-buzz-950.mp3");


function start(d){

difficulty=d;

score=0;
combo=0;
mistakes=0;
index=0;

updateScore();
updateLives();

document.getElementById("targets").innerHTML="";
document.getElementById("choices").innerHTML="";

document.getElementById("startBtn").style.display="block";

show("game");

}


function startGame(){

document.getElementById("startBtn").style.display="none";

newQuestion();

}


function count(){

if(difficulty==="easy") return 1;

if(difficulty==="normal") return Math.min(score+1,4);

if(difficulty==="hard") return Math.min(score+1,8);

if(difficulty==="express") return Math.min(score+1,8);

}


// =================
// Question
// =================

function newQuestion(){

index=0;

targets=[];
choices=[];

document.getElementById("choices").innerHTML="";

for(let i=0;i<count();i++){

targets.push(

emojiList[Math.floor(Math.random()*emojiList.length)]

);

}

let set=new Set(targets);

while(set.size<8){

set.add(

emojiList[Math.floor(Math.random()*emojiList.length)]

);

}

choices=[...set].sort(()=>Math.random()-0.5);

showTargets();

setTimeout(()=>{

document.getElementById("targets").innerHTML="";

showChoices();

},1000);

}


function showTargets(){

let div=document.getElementById("targets");

div.innerHTML="";

targets.forEach(e=>{

let s=document.createElement("span");

s.className="target";

s.innerText=e;

div.appendChild(s);

});

}


function showChoices(){

let grid=document.getElementById("choices");

grid.innerHTML="";

choices.forEach(e=>{

let btn=document.createElement("button");

btn.innerText=e;

btn.onclick=()=>check(e,btn);

grid.appendChild(btn);

});

}

// =================
// 判定
// =================

function showResult(symbol){

let r=document.getElementById("result");

r.innerText=symbol;

r.classList.add("showResult");

setTimeout(()=>{

r.classList.remove("showResult");

},1000);

}


function check(e,btn){

btn.style.background="#0d47a1";

if(e===targets[index]){

okSound.play();

showResult("⭕");

setTimeout(()=>{

index++;

if(index>=targets.length){

score++;
combo++;

updateScore();

newQuestion();

}

},1000);

}else{

ngSound.play();

showResult("❌");

setTimeout(()=>{

mistakes++;

combo=0;

updateLives();

if(mistakes>=maxMistakes){

alert("Game Over\nScore "+score);

showMenu();

}else{

index=0;

}

},1000);

}

}


function updateScore(){

document.getElementById("score").innerText="Score "+score;

}

function updateLives(){

document.getElementById("lives").innerText="Lives "+(maxMistakes-mistakes);

}

// =================
// Ranking
// =================

function openRanking(){

let box=document.getElementById("rankingList");

box.innerHTML="";

difficulties.forEach(d=>{

let title=document.createElement("h2");

title.innerText=d;

box.appendChild(title);

let arr=scores[d];

for(let i=0;i<5;i++){

let div=document.createElement("div");

div.className="rank";

div.innerText=i<arr.length?(i+1)+": "+arr[i]:(i+1)+": ---";

box.appendChild(div);

}

});

show("ranking");

}

</script>
</body>
</html>
