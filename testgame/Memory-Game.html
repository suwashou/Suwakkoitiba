<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Memory Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:sans-serif;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding-top:40px;
}

.container{
width:360px;
text-align:center;
margin:auto;
}

.screen{display:none;}
.active{display:block;}

.title{
font-size:50px;
margin-bottom:40px;
}

button{
border:none;
cursor:pointer;
display:block;
margin-left:auto;
margin-right:auto;
}

.big{
font-size:40px;
width:260px;
height:90px;
border-radius:20px;
color:white;
}

.mid{
font-size:30px;
width:260px;
height:80px;
border-radius:20px;
color:white;
}

.circle{
width:100px;
height:100px;
border-radius:50%;
font-size:30px;
color:white;
margin:10px auto;
}

.green{background:green}
.orange{background:orange}
.blue{background:#2196f3}
.purple{background:purple}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.grid button{
font-size:50px;
height:80px;
border-radius:15px;
background:#2196f3;
color:white;
transition:0.15s;
}

.grid button:active{
transform:scale(0.9);
background:#1565c0;
}

.target{
font-size:70px;
margin:5px;
}

.combo{
font-size:24px;
color:red;
}

.rank{
font-size:26px;
}

.back{
margin-top:30px;
font-size:28px;
}

#ranking{
max-height:80vh;
overflow-y:auto;
}

#lives{
font-size:20px;
color:red;
margin-top:10px;
}

/* 判定表示 */

#mark{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
display:none;
z-index:999;
}

/* 正解履歴 */

#progress{
font-size:40px;
margin-top:10px;
}

.done{
opacity:1;
}

.todo{
opacity:0.3;
}

</style>
</head>

<body>

<div class="container">

<div id="menu" class="screen active">

<div class="title">🧠 メモリーゲーム</div>

<button class="big green" onclick="openLevel()">スタート</button>

<br>

<button class="mid orange" onclick="openRanking()">ランキング</button>

</div>

<div id="level" class="screen">

<h1>難易度</h1>

<div id="levelButtons"></div>

<button class="back" onclick="showMenu()">戻る</button>

</div>

<div id="game" class="screen">

<div id="score"></div>
<div id="combo"></div>
<div id="lives"></div>

<div id="progress"></div>

<br>

<button id="startBtn" class="big green" onclick="startGame()">スタート</button>

<div id="targets"></div>

<div id="choices" class="grid"></div>

<button class="back" onclick="showMenu()">戻る</button>

</div>

<div id="ranking" class="screen">

<h1>🏆 ランキング</h1>

<div id="rankingList"></div>

<button class="back" onclick="showMenu()">戻る</button>

</div>

</div>

<div id="mark"></div>

<script>

const emojiList=[
"😀","😃","😄","😁","😆","😅","😂","🤣","🙂","🙃",
"🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼",
"🍎","🍊","🍋","🍌","🍉","🍇","🍓",
"🚗","🚕","🚙","🚌","🚎","🏎",
"⚽","🏀","🏈","⚾","🎾",
"🎸","🎹","🥁","🎺","🎻",
"🌸","🌹","🌺","🌻",
"⭐","🌟","✨","⚡","🔥"
];

const difficulties=["easy","normal","hard","express"];

let difficulty;
let targets=[];
let choices=[];
let index=0;
let score=0;
let combo=0;
let mistakes=0;

const maxMistakes=3;

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function showMenu(){show("menu");}

function openLevel(){

let box=document.getElementById("levelButtons");
box.innerHTML="";

difficulties.forEach(d=>{

let btn=document.createElement("button");
btn.className="mid blue";
btn.innerText=d;
btn.onclick=()=>start(d);

box.appendChild(btn);
box.appendChild(document.createElement("br"));
box.appendChild(document.createElement("br"));

});

show("level");
}

function start(d){

difficulty=d;
score=0;
combo=0;
mistakes=0;
index=0;

updateScore();
updateLives();

document.getElementById("targets").innerHTML="";
document.getElementById("choices").innerHTML="";
document.getElementById("startBtn").style.display="block";

show("game");
}

function startGame(){

document.getElementById("startBtn").style.display="none";
newQuestion();

}

function count(){

if(difficulty==="easy") return 1;
if(difficulty==="normal") return Math.min(score+1,4);
if(difficulty==="hard") return Math.min(score+1,8);
if(difficulty==="express") return Math.min(score+1,8);

}

function newQuestion(){

index=0;
targets=[];
choices=[];

for(let i=0;i<count();i++){
targets.push(emojiList[Math.floor(Math.random()*emojiList.length)]);
}

let set=new Set(targets);

while(set.size<8){
set.add(emojiList[Math.floor(Math.random()*emojiList.length)]);
}

choices=[...set].sort(()=>Math.random()-0.5);

showTargets();

setTimeout(()=>{
document.getElementById("targets").innerHTML="";
showChoices();
showProgress();
},1000);

}

function showTargets(){

let div=document.getElementById("targets");
div.innerHTML="";

targets.forEach(e=>{
let s=document.createElement("span");
s.className="target";
s.innerText=e;
div.appendChild(s);
});

}

function showChoices(){

let grid=document.getElementById("choices");
grid.innerHTML="";

choices.forEach(e=>{
let btn=document.createElement("button");
btn.innerText=e;
btn.onclick=()=>check(e);
grid.appendChild(btn);
});

}

function showProgress(){

let p=document.getElementById("progress");
p.innerHTML="";

targets.forEach((e,i)=>{

let span=document.createElement("span");

span.innerText=e+" ";

if(i<index) span.className="done";
else span.className="todo";

p.appendChild(span);

});

}

function mark(symbol){

let m=document.getElementById("mark");

m.innerText=symbol;
m.style.display="block";

setTimeout(()=>{
m.style.display="none";
},1000);

}

function check(e){

if(e===targets[index]){

mark("⭕");

setTimeout(()=>{

index++;

showProgress();

if(index>=targets.length){

score++;
combo++;

updateScore();
newQuestion();

}

},1000);

}else{

mark("❌");

setTimeout(()=>{

mistakes++;
combo=0;

updateLives();

if(mistakes>=maxMistakes){

alert("ゲームオーバー\nスコア "+score);
showMenu();

}

},1000);

}

}

function updateScore(){
document.getElementById("score").innerText="スコア "+score;
}

function updateLives(){
document.getElementById("lives").innerText="残り "+(maxMistakes-mistakes);
}

function openRanking(){

let box=document.getElementById("rankingList");
box.innerHTML="ランキングはローカル保存";

show("ranking");

}

</script>
</body>
</html>
