<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Memory Game</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f5f7fb;
text-align:center;
margin:0;
}

h1{
font-size:50px;
margin-top:60px;
font-weight:700;
}

button{
border:none;
border-radius:20px;
cursor:pointer;
transition:0.2s;
box-shadow:0 6px 12px rgba(0,0,0,0.15);
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 16px rgba(0,0,0,0.2);
}

.menuBtn{
width:260px;
height:90px;
font-size:40px;
color:white;
margin:15px;
}

.start{background:#34c759;}
.rank{background:#ff9f0a;}

.circleBtn{
width:100px;
height:100px;
border-radius:50px;
font-size:40px;
color:white;
margin:20px;
}

.help{background:#0a84ff;}
.lang{background:#af52de;}

.levelBtn{
width:260px;
height:80px;
font-size:32px;
background:#0a84ff;
color:white;
margin:15px;
}

#targets{
font-size:70px;
margin:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
max-width:400px;
margin:auto;
}

.emojiBtn{
font-size:50px;
width:90px;
height:80px;
background:#0a84ff;
color:white;
border-radius:15px;
}

#score{
font-size:30px;
font-weight:600;
}

#combo{
font-size:24px;
color:red;
}

.screen{display:none;}

</style>
</head>

<body>

<h1 id="title">🧠 メモリーゲーム</h1>

<!-- MENU -->

<div id="menu">

<button class="menuBtn start" onclick="showLevel()">START</button><br>

<button class="menuBtn rank" onclick="showRanking()">Ranking</button>

<br>

<button class="circleBtn help" onclick="showHelp()">❓</button>

<button class="circleBtn lang" onclick="toggleLang()">EN</button>

</div>

<!-- LEVEL -->

<div id="level" class="screen">

<h2 id="levelText">難易度</h2>

<button class="levelBtn" onclick="startGame('easy')">Easy</button><br>
<button class="levelBtn" onclick="startGame('normal')">Normal</button><br>
<button class="levelBtn" onclick="startGame('hard')">Hard</button><br>
<button class="levelBtn" onclick="startGame('express')">Expert</button><br>

<button onclick="backMenu()">Back</button>

</div>

<!-- GAME -->

<div id="game" class="screen">

<div id="score">Score 0</div>
<div id="combo"></div>

<div id="targets"></div>

<div id="choices" class="grid"></div>

</div>

<!-- HELP -->

<div id="help" class="screen">

<h2 id="helpTitle">使い方</h2>

<p id="helpText">
絵文字を覚えてください。<br>
消えたら同じ順番で押します。
</p>

<button onclick="backMenu()">OK</button>

</div>

<!-- RANKING -->

<div id="ranking" class="screen">

<h2>🏆 Ranking</h2>

<div id="rankingList"></div>

<br>

<button onclick="backMenu()">Back</button>

</div>

<script>

let lang="jp"

let difficulty
let score=0
let combo=0
let targets=[]
let index=0

const emojiList=[
"😀","😃","😄","😁","😆","😅","😂","🤣","🙂","🙃","😉","😊",
"🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨",
"🍎","🍏","🍊","🍋","🍌","🍉","🍇","🍓",
"🚗","🚕","🚙","🚌","🚎","🚲","✈️","🚀",
"⚽","🏀","🏈","⚾","🎾",
"🎸","🎹","🥁","🎺",
"🌸","🌹","🌺","🌻","🌼",
"⭐","🌟","✨","⚡","🔥"
]

function hideAll(){
document.querySelectorAll(".screen").forEach(e=>e.style.display="none")
menu.style.display="none"
}

function showLevel(){
hideAll()
level.style.display="block"
}

function showHelp(){
hideAll()
help.style.display="block"
}

function showRanking(){

hideAll()
ranking.style.display="block"

let html=""

;["easy","normal","hard","express"].forEach(d=>{

let arr=JSON.parse(localStorage.getItem("rank_"+d)||"[]")

html+="<h3>"+d+"</h3>"

for(let i=0;i<5;i++){

html+=`<div>${i+1}: ${arr[i]??"---"}</div>`

}

})

rankingList.innerHTML=html

}

function backMenu(){

hideAll()
menu.style.display="block"

}

function toggleLang(){

lang=lang==="jp"?"en":"jp"

title.innerText=lang==="jp"?"🧠 メモリーゲーム":"🧠 Memory Game"

levelText.innerText=lang==="jp"?"難易度":"Select Level"

helpTitle.innerText=lang==="jp"?"使い方":"How to Play"

helpText.innerHTML=lang==="jp"
?`絵文字を覚えてください。<br>消えたら同じ順番で押します。`
:`Remember the emojis.<br>Tap them in the same order.`

}

function startGame(diff){

difficulty=diff
score=0
combo=0

hideAll()
game.style.display="block"

newQuestion()

}

function count(){

if(difficulty==="easy")return 1
if(difficulty==="normal")return Math.min(score+1,4)
if(difficulty==="hard")return Math.min(score+1,8)
if(difficulty==="express")return Math.min(score+1,8)

}

function randomEmoji(){

return emojiList[Math.floor(Math.random()*emojiList.length)]

}

function newQuestion(){

targets=[]
index=0

for(let i=0;i<count();i++){
targets.push(randomEmoji())
}

targetsDiv.innerText=targets.join(" ")

choices.innerHTML=""

let time=difficulty==="express"
?Math.max(500,2000-score*100)
:2000

setTimeout(showChoices,time)

}

function showChoices(){

targetsDiv.innerText=""

let set=new Set(targets)

while(set.size<8){
set.add(randomEmoji())
}

let arr=[...set].sort(()=>Math.random()-0.5)

choices.innerHTML=""

arr.forEach(e=>{

let b=document.createElement("button")

b.className="emojiBtn"
b.innerText=e

b.onclick=()=>check(e)

choices.appendChild(b)

})

}

function check(e){

if(e===targets[index]){

index++

if(index>=targets.length){

score++
combo++

scoreText()

saveScore()

newQuestion()

}

}else{

alert("Game Over\nScore "+score)

backMenu()

}

}

function scoreText(){

score.innerText="Score "+score

combo.innerText=combo>1?"🔥 Combo "+combo:""

}

function saveScore(){

let key="rank_"+difficulty

let arr=JSON.parse(localStorage.getItem(key)||"[]")

arr.push(score)

arr.sort((a,b)=>b-a)

arr=arr.slice(0,5)

localStorage.setItem(key,JSON.stringify(arr))

}

</script>

</body>
</html>
