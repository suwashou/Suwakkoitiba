<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Memory Game</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f5f7fb;
margin:0;
}

.screen{
display:none;
padding-top:40px;
}

.active{
display:block;
}

button{
border:none;
cursor:pointer;
}

.main-title{
font-size:50px;
margin-bottom:40px;
}

.big{
font-size:40px;
width:260px;
height:90px;
border-radius:20px;
color:white;
}

.mid{
font-size:30px;
width:260px;
height:80px;
border-radius:20px;
color:white;
}

.circle{
width:100px;
height:100px;
border-radius:50%;
font-size:30px;
color:white;
}

.green{background:green}
.orange{background:orange}
.blue{background:#2196f3}
.purple{background:purple}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
max-width:300px;
margin:auto;
}

.grid button{
font-size:50px;
height:80px;
border-radius:15px;
background:#2196f3;
color:white;
}

.target{
font-size:70px;
}

.combo{
color:red;
font-size:24px;
}

</style>
</head>


<body>

<!-- MENU -->

<div id="menu" class="screen active">

<div class="main-title" id="title">🧠 メモリーゲーム</div>

<button class="big green" onclick="openLevel()">スタート</button>
<br><br>

<button class="mid orange" onclick="openRanking()">ランキング</button>

<br><br>

<button class="circle blue" onclick="openHelp()">❓</button>

<button class="circle purple" onclick="toggleLang()" id="langbtn">EN</button>

</div>



<!-- LEVEL -->

<div id="level" class="screen">

<h1 id="leveltitle">難易度</h1>

<div id="levels"></div>

<br>
<button onclick="showMenu()">戻る</button>

</div>



<!-- GAME -->

<div id="game" class="screen">

<div id="score">スコア 0</div>
<div id="combo"></div>

<br>

<button id="startBtn" class="big green" onclick="startGame()">スタート</button>

<br><br>

<div id="targets"></div>

<br>

<div id="choices" class="grid"></div>

</div>



<!-- RANKING -->

<div id="ranking" class="screen">

<h1>🏆 ランキング</h1>

<div id="rankings"></div>

<br>

<button onclick="showMenu()">戻る</button>

</div>



<!-- HELP -->

<div id="help" class="screen">

<h1 id="helpTitle">使い方</h1>

<div id="helpText"></div>

<br>

<button onclick="showMenu()">OK</button>

</div>



<script>

// language

let language="jp"

// difficulty

const difficulties=["easy","normal","hard","express"]

// emoji list

const emojiList=[

"😀","😃","😄","😁","😆","😅","😂","🤣","🙂","🙃","😉","😊",
"🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨",
"🍎","🍏","🍊","🍋","🍌","🍉","🍇","🍓",
"🚗","🚕","🚙","🚌","🚎","🏎","🚓",
"⚽","🏀","🏈","⚾","🎾",
"🎸","🎹","🥁","🎺","🎻",
"🌸","🌹","🌺","🌻","🌼",
"⭐","🌟","✨","⚡","🔥"
]

// ranking

let scores={
easy:[],
normal:[],
hard:[],
express:[]
}

// load ranking

function loadRanking(){

let data=localStorage.getItem("ranking")

if(data) scores=JSON.parse(data)

}

function saveRanking(){

localStorage.setItem("ranking",JSON.stringify(scores))

}

function addScore(score,diff){

let arr=scores[diff]

arr.push(score)

arr.sort((a,b)=>b-a)

if(arr.length>5) arr=arr.slice(0,5)

scores[diff]=arr

saveRanking()

}

loadRanking()



// screen control

function show(id){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function showMenu(){show("menu")}



// language toggle

function toggleLang(){

language = language==="jp"?"en":"jp"

document.getElementById("langbtn").innerText=language==="jp"?"EN":"JP"

}



// level select

function openLevel(){

let box=document.getElementById("levels")
box.innerHTML=""

difficulties.forEach(d=>{

let btn=document.createElement("button")

btn.className="mid blue"

btn.innerText={
easy:language==="jp"?"簡単":"Easy",
normal:language==="jp"?"普通":"Normal",
hard:language==="jp"?"難しい":"Hard",
express:language==="jp"?"エキスパート":"Expert"
}[d]

btn.onclick=()=>start(d)

box.appendChild(btn)
box.appendChild(document.createElement("br"))
box.appendChild(document.createElement("br"))

})

show("level")

}



// game variables

let difficulty
let targets=[]
let choices=[]
let index=0
let score=0
let combo=0



function start(diff){

difficulty=diff
score=0
combo=0

document.getElementById("score").innerText="Score 0"
document.getElementById("combo").innerText=""

show("game")

}



function startGame(){

document.getElementById("startBtn").style.display="none"

newQuestion()

}



function count(){

if(difficulty==="easy") return 1
if(difficulty==="normal") return Math.min(score+1,4)
if(difficulty==="hard") return Math.min(score+1,8)
if(difficulty==="express") return Math.min(score+1,8)

}



function newQuestion(){

index=0
targets=[]
choices=[]

for(let i=0;i<count();i++){

targets.push(emojiList[Math.floor(Math.random()*emojiList.length)])

}

let set=new Set(targets)

while(set.size<8){

set.add(emojiList[Math.floor(Math.random()*emojiList.length)])

}

choices=[...set].sort(()=>Math.random()-0.5)

showTargets()

let time = difficulty==="express"
? Math.max(0.5,2-score*0.1)
: 2

setTimeout(showChoices,time*1000)

}



function showTargets(){

let div=document.getElementById("targets")

div.innerHTML=""

targets.forEach(e=>{

let span=document.createElement("span")
span.className="target"
span.innerText=e
div.appendChild(span)

})

}



function showChoices(){

document.getElementById("targets").innerHTML=""

let grid=document.getElementById("choices")
grid.innerHTML=""

choices.forEach(e=>{

let btn=document.createElement("button")

btn.innerText=e

btn.onclick=()=>check(e)

grid.appendChild(btn)

})

}



function check(e){

if(e===targets[index]){

index++

if(index>=targets.length){

score++
combo++

document.getElementById("score").innerText="Score "+score

if(combo>1){

document.getElementById("combo").innerText="🔥 Combo "+combo

}

addScore(score,difficulty)

newQuestion()

}

}else{

combo=0

alert("Game Over\nScore "+score)

showMenu()

}

}



// ranking

function openRanking(){

let box=document.getElementById("rankings")
box.innerHTML=""

difficulties.forEach(d=>{

let title=document.createElement("h2")
title.innerText=d

box.appendChild(title)

let arr=scores[d]

for(let i=0;i<5;i++){

let div=document.createElement("div")

div.innerText = i<arr.length ? (i+1)+": "+arr[i] : (i+1)+": ---"

box.appendChild(div)

}

})

show("ranking")

}



// help

function openHelp(){

document.getElementById("helpText").innerText=

language==="jp"?

`絵文字を覚えてください。
消えたら同じ順番で押します。

簡単:1個
普通:最大4個
難しい:最大8個
エクスプレス:どんどん速くなる`

:

`Remember the emojis.
Tap them in the same order.

Easy:1 emoji
Normal:up to 4
Hard:up to 8
Express: gets faster`

show("help")

}

</script>

</body>
</html>
