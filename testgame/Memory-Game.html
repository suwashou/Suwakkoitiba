<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Memory Game</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#f5f7fb;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
}

/* タイトル */

.title{
font-size:50px;
margin-bottom:50px;
}

/* ボタン */

button{
border:none;
border-radius:20px;
cursor:pointer;
color:white;
font-weight:600;
box-shadow:0 6px 12px rgba(0,0,0,0.15);
}

/* メニュー */

.bigBtn{
width:260px;
height:90px;
font-size:40px;
margin:15px 0;
}

.start{background:#34c759;}
.rank{background:#ff9f0a;}

.circleArea{
margin-top:40px;
display:flex;
justify-content:center;
gap:40px;
}

.circleBtn{
width:100px;
height:100px;
border-radius:50%;
font-size:40px;
}

.help{background:#0a84ff;}
.lang{background:#af52de;}

/* 難易度 */

.levelBtn{
width:260px;
height:80px;
font-size:32px;
background:#0a84ff;
margin:10px 0;
}

/* 戻る */

.backBtn{
margin-top:30px;
font-size:28px;
color:black;
background:none;
box-shadow:none;
}

/* スコア */

.score{
font-size:30px;
margin-bottom:10px;
}

.combo{
font-size:24px;
color:red;
margin-bottom:20px;
}

/* 絵文字 */

#targets{
font-size:70px;
margin:30px 0;
min-height:90px;
}

/* グリッド */

.grid{
display:grid;
grid-template-columns:repeat(3,90px);
gap:20px;
justify-content:center;
}

/* 絵文字ボタン */

.emojiBtn{
font-size:50px;
width:90px;
height:80px;
background:#0a84ff;
border-radius:15px;
}

/* 画面 */

.screen{display:none;}

</style>
</head>

<body>

<div class="container">

<!-- MENU -->

<div id="menu">

<div class="title">🧠 メモリーゲーム</div>

<button class="bigBtn start" onclick="showLevel()">スタート</button>

<button class="bigBtn rank" onclick="showRanking()">ランキング</button>

<div class="circleArea">
<button class="circleBtn help" onclick="showHelp()">❓</button>
</div>

</div>

<!-- LEVEL -->

<div id="level" class="screen">

<div class="title">難易度</div>

<button class="levelBtn" onclick="startGame('easy')">簡単</button>
<button class="levelBtn" onclick="startGame('normal')">普通</button>
<button class="levelBtn" onclick="startGame('hard')">難しい</button>
<button class="levelBtn" onclick="startGame('express')">エキスパート</button>

<br>

<button class="backBtn" onclick="backMenu()">戻る</button>

</div>

<!-- GAME -->

<div id="game" class="screen">

<div id="score" class="score">スコア 0</div>

<div id="combo" class="combo"></div>

<div id="targets"></div>

<div id="choices" class="grid"></div>

<button class="backBtn" onclick="backMenu()">メニュー</button>

</div>

<!-- HELP -->

<div id="help" class="screen">

<div class="title">使い方</div>

<p>
絵文字を覚えてください。<br>
消えたら同じ順番で押します。
</p>

<p>
簡単: 1個<br>
普通: 最大4個<br>
難しい: 最大8個<br>
エキスパート: どんどん速くなる
</p>

<button class="backBtn" onclick="backMenu()">OK</button>

</div>

<!-- RANKING -->

<div id="ranking" class="screen">

<div class="title">🏆 ランキング</div>

<div id="rankingList"></div>

<button class="backBtn" onclick="backMenu()">戻る</button>

</div>

</div>

<script>

let difficulty
let score=0
let combo=0
let targets=[]
let index=0

const emojiList=[
"😀","😃","😄","😁","😆","😅","😂","🤣","🙂","🙃",
"🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼",
"🍎","🍊","🍌","🍉","🍇","🍓",
"🚗","🚕","🚙","🚌","🚲","✈️",
"⚽","🏀","⚾","🎾",
"🎸","🎹","🥁",
"🌸","🌹","🌻",
"⭐","✨","🔥"
]

const menu=document.getElementById("menu")
const level=document.getElementById("level")
const game=document.getElementById("game")
const help=document.getElementById("help")
const ranking=document.getElementById("ranking")

const targetsDiv=document.getElementById("targets")
const choicesDiv=document.getElementById("choices")
const scoreText=document.getElementById("score")
const comboText=document.getElementById("combo")

function hideAll(){

menu.style.display="none"
level.style.display="none"
game.style.display="none"
help.style.display="none"
ranking.style.display="none"

}

function showLevel(){

hideAll()
level.style.display="block"

}

function showHelp(){

hideAll()
help.style.display="block"

}

function showRanking(){

hideAll()
ranking.style.display="block"

let html=""

;["easy","normal","hard","express"].forEach(d=>{

let arr=JSON.parse(localStorage.getItem("rank_"+d)||"[]")

html+="<h3>"+d+"</h3>"

for(let i=0;i<5;i++){
html+=`<div>${i+1}: ${arr[i]??"---"}</div>`
}

})

document.getElementById("rankingList").innerHTML=html

}

function backMenu(){

hideAll()
menu.style.display="block"

}

function startGame(diff){

difficulty=diff
score=0
combo=0

hideAll()
game.style.display="block"

updateScore()

newQuestion()

}

function count(){

if(difficulty==="easy")return 1
if(difficulty==="normal")return Math.min(score+1,4)
if(difficulty==="hard")return Math.min(score+1,8)
if(difficulty==="express")return Math.min(score+1,8)

}

function randomEmoji(){

return emojiList[Math.floor(Math.random()*emojiList.length)]

}

function newQuestion(){

targets=[]
index=0

choicesDiv.innerHTML=""
choicesDiv.style.display="none"

for(let i=0;i<count();i++){
targets.push(randomEmoji())
}

targetsDiv.innerText=targets.join(" ")

let time = difficulty==="express"
?Math.max(500,2000-score*100)
:2000

setTimeout(()=>{

targetsDiv.innerText=""

choicesDiv.style.display="grid"

showChoices()

},time)

}

function showChoices(){

let set=new Set(targets)

while(set.size<8){
set.add(randomEmoji())
}

let arr=[...set].sort(()=>Math.random()-0.5)

choicesDiv.innerHTML=""

arr.forEach(e=>{

let b=document.createElement("button")

b.className="emojiBtn"
b.innerText=e

b.onclick=()=>check(e)

choicesDiv.appendChild(b)

})

}

function check(e){

if(e===targets[index]){

index++

if(index>=targets.length){

score++
combo++

updateScore()
saveScore()

newQuestion()

}

}else{

alert("ゲームオーバー\nスコア "+score)

backMenu()

}

}

function updateScore(){

scoreText.innerText="スコア "+score

comboText.innerText=
combo>1?"🔥 コンボ "+combo:""

}

function saveScore(){

let key="rank_"+difficulty

let arr=JSON.parse(localStorage.getItem(key)||"[]")

arr.push(score)

arr.sort((a,b)=>b-a)

arr=arr.slice(0,5)

localStorage.setItem(key,JSON.stringify(arr))

}

</script>

</body>
</html>
