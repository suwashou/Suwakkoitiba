<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Memory Game</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f5f7fb;
}

button{
font-size:20px;
padding:15px 30px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
justify-content:center;
}

.emojiBtn{
font-size:40px;
width:100px;
height:80px;
background:#3498db;
color:white;
border-radius:10px;
}

#targets{
font-size:60px;
margin:30px;
}

</style>
</head>

<body>

<h1 id="title">рЯІ† гГ°гГҐгГ™гГЉгВ≤гГЉгГ†</h1>

<div id="menu">

<button onclick="showLevel()">гВєгВњгГЉгГИ</button>
<br>

<button onclick="showRanking()">гГ©гГ≥гВ≠гГ≥гВ∞</button>
<br>

<button onclick="toggleLang()">EN / JP</button>

</div>

<div id="level" style="display:none">

<h2 id="levelText">йЫ£жШУеЇ¶</h2>

<button onclick="startGame('easy')">Easy</button>
<button onclick="startGame('normal')">Normal</button>
<button onclick="startGame('hard')">Hard</button>
<button onclick="startGame('express')">Expert</button>

<br><br>

<button onclick="backMenu()">жИїгВЛ</button>

</div>

<div id="game" style="display:none">

<h2 id="scoreText">Score 0</h2>

<div id="targets"></div>

<div id="choices" class="grid"></div>

</div>

<div id="ranking" style="display:none">

<h2>рЯПЖ Ranking</h2>

<div id="rankingList"></div>

<br>

<button onclick="backMenu()">Back</button>

</div>

<script>

// language

let lang = "jp"

// game state

let difficulty
let score = 0
let combo = 0
let targets = []
let choices = []
let index = 0

// emoji list

const emojiList = [
"рЯША","рЯШГ","рЯШД","рЯШБ","рЯШЖ","рЯШЕ","рЯШВ","рЯ§£","рЯЩВ","рЯЩГ",
"рЯРґ","рЯР±","рЯР≠","рЯРє","рЯР∞","рЯ¶К","рЯРї","рЯРЉ","рЯР®",
"рЯНО","рЯНП","рЯНК","рЯНЛ","рЯНМ","рЯНЙ","рЯНЗ","рЯНУ",
"рЯЪЧ","рЯЪХ","рЯЪЩ","рЯЪМ","рЯЪО","рЯЪ≤","вЬИпЄП","рЯЪА",
"вЪљ","рЯПА","рЯПИ","вЪЊ","рЯОЊ",
"рЯОЄ","рЯОє","рЯ•Б","рЯОЇ",
"рЯМЄ","рЯМє","рЯМЇ","рЯМї","рЯМЉ",
"в≠Р","рЯМЯ","вЬ®","вЪ°","рЯФ•"
]

// menu

function showLevel(){
menu.style.display="none"
level.style.display="block"
}

function backMenu(){
level.style.display="none"
game.style.display="none"
ranking.style.display="none"
menu.style.display="block"
}

// language

function toggleLang(){

lang = lang==="jp"?"en":"jp"

title.innerText = lang==="jp"?"рЯІ† гГ°гГҐгГ™гГЉгВ≤гГЉгГ†":"рЯІ† Memory Game"
levelText.innerText = lang==="jp"?"йЫ£жШУеЇ¶":"Select Level"

}

// game start

function startGame(diff){

difficulty = diff
score = 0
combo = 0

level.style.display="none"
game.style.display="block"

newQuestion()

}

// number of emojis

function count(){

if(difficulty==="easy") return 1
if(difficulty==="normal") return Math.min(score+1,4)
if(difficulty==="hard") return Math.min(score+1,8)
if(difficulty==="express") return Math.min(score+1,8)

}

// new question

function newQuestion(){

targets=[]
index=0

let c = count()

for(let i=0;i<c;i++){
targets.push(randomEmoji())
}

showTargets()

setTimeout(showChoices,2000)

}

function randomEmoji(){
return emojiList[Math.floor(Math.random()*emojiList.length)]
}

// show targets

function showTargets(){

targetsDiv = document.getElementById("targets")

targetsDiv.innerText = targets.join(" ")

choices.innerHTML=""

}

// show choices

function showChoices(){

let set = new Set(targets)

while(set.size < 8){
set.add(randomEmoji())
}

choices = [...set].sort(()=>Math.random()-0.5)

const grid = document.getElementById("choices")

grid.innerHTML=""

choices.forEach(e=>{

let btn = document.createElement("button")
btn.className="emojiBtn"
btn.innerText=e

btn.onclick=()=>check(e)

grid.appendChild(btn)

})

}

// check answer

function check(e){

if(e===targets[index]){

index++

if(index>=targets.length){

score++

document.getElementById("scoreText").innerText="Score "+score

saveScore()

newQuestion()

}

}else{

alert("Game Over\nScore "+score)

backMenu()

}

}

// ranking

function saveScore(){

let key="ranking_"+difficulty

let arr = JSON.parse(localStorage.getItem(key) || "[]")

arr.push(score)

arr.sort((a,b)=>b-a)

arr = arr.slice(0,5)

localStorage.setItem(key,JSON.stringify(arr))

}

function showRanking(){

menu.style.display="none"
ranking.style.display="block"

let html=""

;["easy","normal","hard","express"].forEach(d=>{

let arr = JSON.parse(localStorage.getItem("ranking_"+d) || "[]")

html+="<h3>"+d+"</h3>"

for(let i=0;i<5;i++){

html += "<div>"+(i+1)+": "+(arr[i]||"---")+"</div>"

}

})

rankingList.innerHTML = html

}

</script>

</body>
</html>
