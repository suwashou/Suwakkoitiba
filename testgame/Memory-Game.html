<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Memory Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:sans-serif;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:360px;
text-align:center;
}

.screen{
display:none;
}

.active{
display:block;
}

.title{
font-size:50px;
margin-bottom:40px;
}

button{
border:none;
cursor:pointer;
}

.big{
font-size:40px;
width:260px;
height:90px;
border-radius:20px;
color:white;
}

.mid{
font-size:30px;
width:260px;
height:80px;
border-radius:20px;
color:white;
}

.circle{
width:100px;
height:100px;
border-radius:50%;
font-size:30px;
color:white;
margin:10px;
}

.green{background:green}
.orange{background:orange}
.blue{background:#2196f3}
.purple{background:purple}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.grid button{
font-size:50px;
height:80px;
border-radius:15px;
background:#2196f3;
color:white;
}

.target{
font-size:70px;
}

.combo{
font-size:24px;
color:red;
}

.rank{
font-size:26px;
}

.back{
margin-top:30px;
font-size:28px;
}

</style>
</head>

<body>

<div class="container">

<!-- MENU -->

<div id="menu" class="screen active">

<div class="title" id="title">🧠 メモリーゲーム</div>

<button class="big green" onclick="openLevel()">スタート</button>
<br><br>

<button class="mid orange" onclick="openRanking()">ランキング</button>

<br><br>

<button class="circle blue" onclick="openHelp()">❓</button>

<button class="circle purple" onclick="toggleLang()" id="langBtn">EN</button>

</div>



<!-- LEVEL -->

<div id="level" class="screen">

<h1 id="levelTitle">難易度</h1>

<div id="levelButtons"></div>

<button class="back" onclick="showMenu()">戻る</button>

</div>



<!-- GAME -->

<div id="game" class="screen">

<div id="score">スコア 0</div>

<div id="combo"></div>

<br>

<button id="startBtn" class="big green" onclick="startGame()">スタート</button>

<div id="targets"></div>

<div id="choices" class="grid"></div>

<button class="back" onclick="showMenu()">戻る</button>

</div>



<!-- RANKING -->

<div id="ranking" class="screen">

<h1>🏆 ランキング</h1>

<div id="rankingList"></div>

<button class="back" onclick="showMenu()">戻る</button>

</div>



<!-- HELP -->

<div id="help" class="screen">

<h1 id="helpTitle">使い方</h1>

<div id="helpText"></div>

<button class="back" onclick="showMenu()">OK</button>

</div>

</div>



<script>

// language

let language="jp"

function toggleLang(){

language = language==="jp"?"en":"jp"

document.getElementById("langBtn").innerText =
language==="jp"?"EN":"JP"

}



// difficulties

const difficulties=["easy","normal","hard","express"]



function difficultyText(d){

if(language==="jp"){

return {
easy:"簡単",
normal:"普通",
hard:"難しい",
express:"エキスパート"
}[d]

}else{

return {
easy:"Easy",
normal:"Normal",
hard:"Hard",
express:"Expert"
}[d]

}

}



// emoji

const emojiList=[
"😀","😃","😄","😁","😆","😅","😂","🤣","🙂","🙃",
"🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼",
"🍎","🍊","🍋","🍌","🍉","🍇","🍓",
"🚗","🚕","🚙","🚌","🚎","🏎",
"⚽","🏀","🏈","⚾","🎾",
"🎸","🎹","🥁","🎺","🎻",
"🌸","🌹","🌺","🌻",
"⭐","🌟","✨","⚡","🔥"
]



// ranking

let scores={
easy:[],
normal:[],
hard:[],
express:[]
}

function loadRanking(){

let data=localStorage.getItem("ranking")

if(data) scores=JSON.parse(data)

}

function saveRanking(){

localStorage.setItem("ranking",JSON.stringify(scores))

}

function isRanking(score,d){

let arr=scores[d]

if(arr.length<5) return true

return score>arr[arr.length-1]

}

function addScore(score,d){

let arr=scores[d]

arr.push(score)

arr.sort((a,b)=>b-a)

if(arr.length>5) arr=arr.slice(0,5)

scores[d]=arr

saveRanking()

}

loadRanking()



// screen

function show(id){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function showMenu(){

show("menu")

}



// level select

function openLevel(){

let box=document.getElementById("levelButtons")

box.innerHTML=""

difficulties.forEach(d=>{

let btn=document.createElement("button")

btn.className="mid blue"

btn.innerText=difficultyText(d)

btn.onclick=()=>start(d)

box.appendChild(btn)

box.appendChild(document.createElement("br"))
box.appendChild(document.createElement("br"))

})

show("level")

}



// game

let difficulty
let targets=[]
let choices=[]
let index=0
let score=0
let combo=0



function start(d){

difficulty=d
score=0
combo=0
index=0

document.getElementById("score").innerText="スコア 0"
document.getElementById("combo").innerText=""

document.getElementById("targets").innerHTML=""
document.getElementById("choices").innerHTML=""

document.getElementById("startBtn").style.display="block"

show("game")

}



function startGame(){

document.getElementById("startBtn").style.display="none"

newQuestion()

}



function count(){

if(difficulty==="easy") return 1
if(difficulty==="normal") return Math.min(score+1,4)
if(difficulty==="hard") return Math.min(score+1,8)
if(difficulty==="express") return Math.min(score+1,8)

}



function newQuestion(){

index=0

targets=[]
choices=[]

document.getElementById("choices").innerHTML=""



for(let i=0;i<count();i++){

targets.push(
emojiList[Math.floor(Math.random()*emojiList.length)]
)

}



let set=new Set(targets)

while(set.size<8){

set.add(
emojiList[Math.floor(Math.random()*emojiList.length)]
)

}



choices=[...set].sort(()=>Math.random()-0.5)



showTargets()



let time = difficulty==="express"
? Math.max(0.5,2-score*0.1)
: 2



setTimeout(showChoices,time*1000)

}



function showTargets(){

let div=document.getElementById("targets")

div.innerHTML=""

targets.forEach(e=>{

let span=document.createElement("span")

span.className="target"

span.innerText=e

div.appendChild(span)

})

}



function showChoices(){

document.getElementById("targets").innerHTML=""



let grid=document.getElementById("choices")

grid.innerHTML=""



choices.forEach(e=>{

let btn=document.createElement("button")

btn.innerText=e

btn.onclick=()=>check(e)

grid.appendChild(btn)

})

}



function check(e){

if(e===targets[index]){

index++

if(index>=targets.length){

score++
combo++



document.getElementById("score").innerText="スコア "+score



if(combo>1){

document.getElementById("combo").innerText="🔥 コンボ "+combo

}



if(isRanking(score,difficulty)){

if(!scores[difficulty].includes(score)){

addScore(score,difficulty)

}

}



newQuestion()

}

}else{

alert("ゲームオーバー\nスコア "+score)

showMenu()

}

}



// ranking

function openRanking(){

let box=document.getElementById("rankingList")

box.innerHTML=""



difficulties.forEach(d=>{

let title=document.createElement("h2")

title.innerText=difficultyText(d)

box.appendChild(title)



let arr=scores[d]

for(let i=0;i<5;i++){

let div=document.createElement("div")

div.className="rank"



div.innerText=
i<arr.length
? (i+1)+"位: "+arr[i]
: (i+1)+"位: ---"



box.appendChild(div)

}

})



show("ranking")

}



// help

function openHelp(){

document.getElementById("helpText").innerText=

`絵文字を覚えてください。
消えたら同じ順番で押します。

簡単:1個
普通:最大4個
難しい:最大8個
エキスプレス:どんどん速くなる`



show("help")

}

</script>

</body>
</html>
