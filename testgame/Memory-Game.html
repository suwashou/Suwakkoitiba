<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Memory Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:sans-serif;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding-top:40px;
}

.container{
width:360px;
text-align:center;
margin:auto;
}

.screen{display:none;}
.active{display:block;}

.title{font-size:50px;margin-bottom:40px;}

button{
border:none;
cursor:pointer;
display:block;
margin-left:auto;
margin-right:auto;
}

.big{font-size:40px;width:260px;height:90px;border-radius:20px;color:white;}
.mid{font-size:30px;width:260px;height:80px;border-radius:20px;color:white;}

.circle{
width:100px;
height:100px;
border-radius:50%;
font-size:30px;
color:white;
margin:10px auto;
}

.green{background:green}
.orange{background:orange}
.blue{background:#2196f3}
.purple{background:purple}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.grid button{
font-size:50px;
height:80px;
border-radius:15px;
background:#2196f3;
color:white;
transition:0.15s;
}

.grid button:active{
transform:scale(0.9);
background:#1565c0;
}

.target{font-size:70px;margin:5px;}

.combo{font-size:24px;color:red;}
.rank{font-size:26px;}
.back{margin-top:30px;font-size:28px;}

#ranking{
max-height:80vh;
overflow-y:auto;
}

#lives{
font-size:20px;
color:red;
margin-top:10px;
}

/* 判定 */

#mark{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
display:none;
z-index:999;
}

</style>
</head>

<body>

<div class="container">

<!-- MENU -->

<div id="menu" class="screen active">

<div class="title" id="title"></div>

<button class="big green" id="startMenuBtn"></button>

<br>

<button class="mid orange" id="rankingMenuBtn"></button>

<br>

<button class="circle blue" onclick="openHelp()">❓</button>
<button class="circle purple" onclick="toggleLang()" id="langBtn"></button>

</div>


<!-- LEVEL -->

<div id="level" class="screen">

<h1 id="levelTitle"></h1>

<div id="levelButtons"></div>

<button class="back" onclick="showMenu()" id="backLevelBtn"></button>

</div>


<!-- GAME -->

<div id="game" class="screen">

<div id="score"></div>
<div id="combo"></div>
<div id="lives"></div>

<br>

<button id="startBtn" class="big green"></button>

<div id="targets"></div>

<div id="choices" class="grid"></div>

<button class="back" onclick="showMenu()" id="backGameBtn"></button>

</div>


<!-- RANKING -->

<div id="ranking" class="screen">

<h1 id="rankingTitle"></h1>

<div id="rankingList"></div>

<button class="back" onclick="showMenu()" id="backRankingBtn"></button>

</div>


<!-- HELP -->

<div id="help" class="screen">

<h1 id="helpTitle"></h1>

<div id="helpText"></div>

<button class="back" onclick="showMenu()" id="okHelpBtn"></button>

</div>

</div>

<div id="mark"></div>

<script>

//================
// Language
//================

let language="jp";

function toggleLang(){
language = language==="jp" ? "en" : "jp";
updateLanguage();
}

function updateLanguage(){

document.getElementById("title").innerText = language==="jp" ? "🧠 メモリーゲーム" : "🧠 Memory Game";
document.getElementById("startMenuBtn").innerText = language==="jp" ? "スタート" : "START";
document.getElementById("rankingMenuBtn").innerText = language==="jp" ? "ランキング" : "Ranking";

document.getElementById("levelTitle").innerText = language==="jp" ? "難易度" : "Select Level";

document.getElementById("backLevelBtn").innerText = language==="jp" ? "戻る" : "Back";
document.getElementById("backGameBtn").innerText = language==="jp" ? "戻る" : "Back";
document.getElementById("backRankingBtn").innerText = language==="jp" ? "戻る" : "Back";

document.getElementById("rankingTitle").innerText = language==="jp" ? "🏆 ランキング" : "🏆 Ranking";

document.getElementById("helpTitle").innerText = language==="jp" ? "使い方" : "How to Play";

document.getElementById("helpText").innerText = language==="jp"
? "絵文字を覚えてください。\n消えたら同じ順番で押します。"
: "Remember the emojis.\nTap them in the same order.";

document.getElementById("startBtn").innerText = language==="jp" ? "スタート" : "Start";

document.getElementById("langBtn").innerText = language==="jp" ? "EN" : "JP";

}

//================
// Difficulty
//================

const difficulties=["easy","normal","hard","express"];

function difficultyText(d){

if(language==="jp")
return {easy:"簡単",normal:"普通",hard:"難しい",express:"エキスパート"}[d];

else
return {easy:"Easy",normal:"Normal",hard:"Hard",express:"Expert"}[d];

}

//================
// Emoji
//================

const emojiList=[
"😀","😃","😄","😁","😆","😅","😂","🤣","🙂","🙃",
"🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼",
"🍎","🍊","🍋","🍌","🍉","🍇","🍓",
"🚗","🚕","🚙","🚌","🚎","🏎",
"⚽","🏀","🏈","⚾","🎾",
"🎸","🎹","🥁","🎺","🎻",
"🌸","🌹","🌺","🌻",
"⭐","🌟","✨","⚡","🔥"
];

//================
// Ranking
//================

let scores={easy:[],normal:[],hard:[],express:[]};

function loadRanking(){
let data=localStorage.getItem("ranking");
if(data) scores=JSON.parse(data);
}

function saveRanking(){
localStorage.setItem("ranking",JSON.stringify(scores));
}

function isRanking(score,d){
let arr=scores[d];
if(arr.length<5) return true;
return score>arr[arr.length-1];
}

function addScore(score,d){
let arr=scores[d];
arr.push(score);
arr.sort((a,b)=>b-a);
if(arr.length>5) arr=arr.slice(0,5);
scores[d]=arr;
saveRanking();
}

loadRanking();

//================
// Screen
//================

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function showMenu(){show("menu")}

//================
// Level
//================

document.getElementById("startMenuBtn").onclick=openLevel;
document.getElementById("rankingMenuBtn").onclick=openRanking;
document.getElementById("startBtn").onclick=startGame;

function openLevel(){

let box=document.getElementById("levelButtons");
box.innerHTML="";

difficulties.forEach(d=>{

let btn=document.createElement("button");
btn.className="mid blue";
btn.innerText=difficultyText(d);
btn.onclick=()=>start(d);

box.appendChild(btn);
box.appendChild(document.createElement("br"));
box.appendChild(document.createElement("br"));

});

show("level");

}

//================
// Game Logic
//================

let difficulty, targets=[], choices=[], index=0, score=0, combo=0, mistakes=0;

const maxMistakes = 3;

function start(d){

difficulty=d;
score=0;
combo=0;
index=0;
mistakes=0;

updateScore();
updateLives();

document.getElementById("targets").innerHTML="";
document.getElementById("choices").innerHTML="";

document.getElementById("startBtn").style.display="block";

document.getElementById("combo").innerText="";

show("game");

}

function startGame(){

document.getElementById("startBtn").style.display="none";

newQuestion();

}

function count(){

if(difficulty==="easy") return 1;
if(difficulty==="normal") return Math.min(score+1,4);
if(difficulty==="hard") return Math.min(score+1,8);
if(difficulty==="express") return Math.min(score+1,8);

}

//================
// Question
//================

function newQuestion(){

index=0;
targets=[];
choices=[];

document.getElementById("choices").innerHTML="";

for(let i=0;i<count();i++){
targets.push(emojiList[Math.floor(Math.random()*emojiList.length)]);
}

let set=new Set(targets);

while(set.size<8)
set.add(emojiList[Math.floor(Math.random()*emojiList.length)]);

choices=[...set].sort(()=>Math.random()-0.5);

showTargets();

setTimeout(()=>{

document.getElementById("targets").innerHTML="";

showChoices();

},1000);

}

function showTargets(){

let div = document.getElementById("targets");
div.innerHTML="";

targets.forEach(e=>{
let s=document.createElement("span");
s.className="target";
s.innerText=e;
div.appendChild(s);
});

}

function showChoices(){

let grid=document.getElementById("choices");
grid.innerHTML="";

choices.forEach(e=>{

let btn=document.createElement("button");

btn.innerText=e;

btn.onclick=()=>check(e);

grid.appendChild(btn);

});

}

//================
// 判定
//================

function mark(symbol){

let m=document.getElementById("mark");

m.innerText=symbol;

m.style.display="block";

setTimeout(()=>{
m.style.display="none";
},1000);

}

function check(e){

if(e === targets[index]){

mark("⭕");

setTimeout(()=>{

index++;

if(index >= targets.length){

score++;
combo++;

updateScore();

if(combo>1)
document.getElementById("combo").innerText =
(language==="jp"?"🔥 コンボ ":"🔥 Combo ")+combo;

if(isRanking(score,difficulty))
if(!scores[difficulty].includes(score))
addScore(score,difficulty);

newQuestion();

}

},1000);

}else{

mark("❌");

setTimeout(()=>{

mistakes++;
combo=0;

updateLives();

if(mistakes >= maxMistakes){

alert((language==="jp"?"ゲームオーバー\nスコア ":"Game Over\nScore ")+score);

showMenu();

}

},1000);

}

}

function updateScore(){
document.getElementById("score").innerText=(language==="jp"?"スコア ":"Score ")+score;
}

function updateLives(){
document.getElementById("lives").innerText=(language==="jp"?"残りチャンス: ":"Lives: ")+(maxMistakes-mistakes);
}

//================
// Ranking
//================

function openRanking(){

let box=document.getElementById("rankingList");
box.innerHTML="";

difficulties.forEach(d=>{

let title=document.createElement("h2");
title.innerText=difficultyText(d);
box.appendChild(title);

let arr=scores[d];

for(let i=0;i<5;i++){

let div=document.createElement("div");
div.className="rank";

div.innerText=i<arr.length
? (language==="jp"?`${i+1}位: ${arr[i]}`:`${i+1}: ${arr[i]}`)
: (language==="jp"?`${i+1}位: ---`:`${i+1}: ---`);

box.appendChild(div);

}

});

show("ranking");

}

//================
// Help
//================

function openHelp(){
show("help");
}

updateLanguage();

</script>
</body>
</html>
